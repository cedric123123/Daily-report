*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f3f4f6;color:#1f2937;line-height:1.6}
.container{max-width:1320px;margin:0 auto;padding:20px}

.header{background:#fff;border-radius:12px;padding:24px 28px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.header h1{font-size:22px;font-weight:700;color:#111827;margin-bottom:4px}
.header .meta{font-size:12px;color:#9ca3af}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi-card{background:#fff;border-radius:10px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.04);border-left:4px solid #3b82f6}
.kpi-card .label{font-size:12px;color:#6b7280;margin-bottom:4px}
.kpi-card .value{font-size:30px;font-weight:700;color:#1e40af;line-height:1.2}
.kpi-card .sub{font-size:11px;color:#9ca3af;margin-top:3px}
.kpi-card.kpi-green{border-left-color:#10b981}
.kpi-card.kpi-green .value{color:#059669}
.kpi-card.kpi-red{border-left-color:#ef4444}
.kpi-card.kpi-red .value{color:#dc2626}
.kpi-card.kpi-amber{border-left-color:#f59e0b}
.kpi-card.kpi-amber .value{color:#d97706}


.charts-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.chart-box{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.chart-box h3{font-size:13px;color:#374151;margin-bottom:4px;font-weight:600;text-align:center}
.chart-inner{height:280px}

.chart-wide{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:18px}
.chart-wide h3{font-size:13px;color:#374151;margin-bottom:4px;font-weight:600;text-align:center}
.chart-wide .chart-inner{height:420px}

.section-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.section-header .dot{width:8px;height:8px;border-radius:99px;background:#3b82f6;flex-shrink:0}
.section-header .title{font-size:15px;font-weight:700;color:#1f2937}
.section-header .count{font-size:12px;color:#9ca3af}

.timeline{margin-bottom:18px}
.timeline-group{margin-bottom:10px}
.timeline-group-date{font-size:12px;color:#3b82f6;font-weight:600;padding:4px 0;margin-bottom:4px}
.timeline-item{background:#fff;border-radius:8px;padding:14px 16px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.04);display:flex;align-items:flex-start;gap:12px}
.timeline-item .t-seq{font-size:12px;color:#9ca3af;min-width:20px;padding-top:2px}
.timeline-item .t-body{flex:1;min-width:0}
.timeline-item .t-name{font-size:14px;font-weight:600;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timeline-item .t-meta{font-size:11px;color:#9ca3af;margin:2px 0}
.timeline-item .t-note{font-size:12px;color:#4b5563}
.timeline-item .t-progress{min-width:42px;text-align:right;padding-top:2px}

.progress-badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:600}
.progress-low{background:#fef2f2;color:#dc2626}
.progress-mid{background:#fef9c3;color:#ca8a04}
.progress-high{background:#f0fdf4;color:#16a34a}
.progress-done{background:#eff6ff;color:#2563eb}

.overdue-table{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:18px}
.overdue-table table{width:100%;border-collapse:collapse}
.overdue-table th{background:#fef2f2;color:#dc2626;font-size:12px;font-weight:600;padding:10px 14px;text-align:left}
.overdue-table td{padding:9px 14px;font-size:12px;border-bottom:1px solid #f9fafb}
.overdue-table tr:last-child td{border-bottom:none}
.overdue-table tr:hover td{background:#fafafa}

.footer{text-align:center;font-size:11px;color:#d1d5db;margin-top:28px;padding:16px 0}

@media(max-width:768px){
.container{padding:10px}
.header{padding:18px 14px;border-radius:8px}
.header h1{font-size:18px}
.kpi-grid{grid-template-columns:repeat(2,1fr);gap:10px}
.kpi-card{padding:14px 16px;border-radius:8px}
.kpi-card .value{font-size:24px}
.charts-row{grid-template-columns:1fr;gap:10px}
.chart-box{padding:12px;border-radius:8px}
.chart-inner{height:240px}
.chart-wide .chart-inner{height:500px}
.timeline-item{flex-wrap:wrap;gap:6px;padding:12px;border-radius:8px}
.timeline-item .t-progress{min-width:auto;width:100%;text-align:left;margin-top:2px}
.overdue-table{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px}
.overdue-table table{min-width:560px}
.overdue-table th,.overdue-table td{padding:7px 9px;font-size:11px}
}
@media(max-width:420px){
.kpi-grid{grid-template-columns:1fr}
.chart-inner{height:200px}
.chart-wide .chart-inner{height:350px}
}
</style>

(function renderTimeline(){
  var items=DATA.followTimeline||[];
  if(!items.length){document.getElementById('timeline-container').innerHTML='<p style="color:#6b7280;font-size:13px;padding:12px">暂无跟进记录。</p>';return;}
  var groups={};
  items.forEach(function(p,i){
    var d=p.date||'';
    if(!groups[d]) groups[d]=[];
    groups[d].push(p);
  });
  // Parse date strings to Date objects for correct chronological sorting (ISO format: YYYY-MM-DD)
  function parseISODate(s) {
    var parts = s.split('-');
    if (parts.length === 3) return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    return new Date(0);
  }
  var dates = Object.keys(groups).sort(function(a, b) {
    return parseISODate(b).getTime() - parseISODate(a).getTime();
  });
  var html='';
  dates.forEach(function(d){
    html+='<div class="timeline-group"><div class="timeline-group-date">'+d+'</div>';
    groups[d].forEach(function(p,idx){
      var prog=Math.round(p.progress*100);
      var cls=prog<25?'progress-low':prog<50?'progress-mid':prog<100?'progress-high':'progress-done';
      var note=(p.note||'').substring(0,120);
      html+='<div class="timeline-item">'+
        '<div class="t-seq">'+(idx+1)+'</div>'+
        '<div class="t-body">'+
          '<div class="t-name">'+p.name+'</div>'+
          '<div class="t-meta">'+p.person+(p.company?' \u00b7 '+p.company:'')+'</div>'+
          '<div class="t-note">'+note+'</div>'+
        '</div>'+
        '<div class="t-progress"><span class="progress-badge '+cls+'">'+prog+'%</span></div>'+
      '</div>';
    });
    html+='</div>';
  });
  document.getElementById('timeline-container').innerHTML=html;
})();

  document.getElementById('overdue-container').innerHTML=h;
})();

var charts={};
(function renderCharts(){
  // Progress pie
  var progressColors=['#fca5a5','#fcd34d','#93c5fd','#60a5fa','#10b981'];
  var isMobile=window.innerWidth<=768;
  var c1=echarts.init(document.getElementById('chart-progress'));
  function setProgressOption(mobile){
    c1.setOption({
      tooltip:{trigger:'item',formatter:'{b}: {c} 个 ({d}%)'},
      legend:{show:!mobile,bottom:0,textStyle:{fontSize:10}},
      series:[{type:'pie',radius:['45%','70%'],center:['50%',mobile?'38%':'45%'],avoidLabelOverlap:true,
        label:{formatter:'{d}%',fontSize:11},
        labelLine:{smooth:true,length:8,length2:12},
        data:DATA.progressBuckets,
        color:progressColors}]
    });
  }
  setProgressOption(isMobile);
  // Custom legend for mobile
  function buildCustomLegend(){
    var el=document.getElementById('progress-legend');
    if(!el)return;
    if(isMobile){
      var labels=['0-25%','25-50%','50-75%','75-99%','已完成'];
      var html='';
      for(var i=0;i<labels.length;i++){
        html+='<span style="display:inline-block;margin:2px 6px;font-size:11px;color:#374151;white-space:nowrap">'+
          '<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+progressColors[i]+';margin-right:4px;vertical-align:middle"></span>'+
          labels[i]+'</span>';
        if(i===2) html+='<br>';
      }
      el.innerHTML='<div style="text-align:center;padding-top:14px">'+html+'</div>';
      el.style.display='block';
    }else{
      el.style.display='none';
    }
  }
  buildCustomLegend();
  charts.c1=c1;

  // Type pie
  var c2=echarts.init(document.getElementById('chart-type'));
  c2.setOption({
    tooltip:{trigger:'item',formatter:'{b}: {c} 个 ({d}%)'},
    legend:{bottom:0,textStyle:{fontSize:10}},
    series:[{type:'pie',radius:['45%','70%'],center:['50%','45%'],avoidLabelOverlap:true,
      label:{formatter:'{d}%',fontSize:11},
      labelLine:{smooth:true,length:8,length2:12},
      data:DATA.typeDistribution, color:['#3b82f6','#8b5cf6','#ec4899']}]
  });
  charts.c2=c2;

  // Person bar
  var c3=echarts.init(document.getElementById('chart-person'));
  c3.setOption({
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
    grid:{left:8,right:16,top:8,bottom:36},
    xAxis:{type:'category',data:DATA.personLoad.map(function(d){return d.name;}),axisLabel:{rotate:30,fontSize:10}},
    yAxis:{type:'value',name:'项目数',nameTextStyle:{fontSize:10}},
    series:[{type:'bar',data:DATA.personLoad.map(function(d){return d.value;}),
      itemStyle:{borderRadius:[4,4,0,0],color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#60a5fa'},{offset:1,color:'#3b82f6'}])},
      label:{show:true,position:'top',fontSize:10,fontWeight:600}}]
  });
  charts.c3=c3;

  // Gantt chart
  var c4=echarts.init(document.getElementById('chart-gantt'));
  var gd=DATA.ganttData||[];
  if(gd.length===0){
    document.getElementById('chart-gantt').innerHTML='<p style="color:#9ca3af;text-align:center;padding-top:160px">暂无有效起止日期项目</p>';
  }else{
    var minDate=Math.min.apply(null,gd.map(function(d){return d.start;}));
    var maxDate=Math.max.apply(null,gd.map(function(d){return d.end;}));
    var range=maxDate-minDate;
    minDate-=range*0.05;
    maxDate+=range*0.08;
    var todayTs=Date.now();
    var tc=DATA.typeColors||{};

    var yData=[];
    gd.forEach(function(d){
      yData.push({name:d.name,type:d.type||'',person:d.person,progress:d.progress,start:d.start,end:d.end});
    });
    yData.reverse();

    // Helper: format date
    function fmtDate(ts){var d=new Date(ts);return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}

    c4.setOption({
      tooltip:{
        trigger:'item',
        backgroundColor:'#fff',
        borderColor:'#e5e7eb',
        borderWidth:1,
        borderRadius:8,
        padding:[6,10],
        textStyle:{color:'#374151',fontSize:12},
        formatter:function(params){
          var d=params.data;
          var sd=fmtDate(d.start),ed=fmtDate(d.end);
          var pct=Math.round(d.progress*100);
          return '<b>'+d.name+'</b><br/>'+
            sd+' ~ '+ed+'<br/>'+
            '进度: '+pct+'%<br/>'+
            (d.person||'')+(d.type?' | '+d.type:'');
        }
      },
      legend:{
        show:true,right:12,top:4,itemWidth:10,itemHeight:10,itemGap:16,
        textStyle:{fontSize:11,color:'#6b7280'},
        data:[
          {name:'计划周期',icon:'rect',itemStyle:{color:'#B0D8FF'}},
          {name:'已完成',icon:'rect',itemStyle:{color:'#2E8B57'}}
        ]
      },
      grid:{left:175,right:30,top:34,bottom:28},
      xAxis:{
        type:'value',min:minDate,max:maxDate,
        axisLine:{show:true,lineStyle:{color:'#d1d5db'}},
        axisTick:{show:false},
        axisLabel:{formatter:function(v){var d=new Date(v);return(d.getMonth()+1)+'/'+d.getDate();},fontSize:10,color:'#9ca3af'},
        splitLine:{show:true,lineStyle:{color:'#e5e7eb',type:'dashed'}},
        name:'时间轴',nameLocation:'end',nameTextStyle:{fontSize:11,fontWeight:'bold',color:'#374151'}
      },
      yAxis:{
        type:'category',
        data:yData.map(function(d){return d.name;}),
        axisLine:{show:true,lineStyle:{color:'#d1d5db'}},
        axisTick:{show:false},
        axisLabel:{fontSize:10,width:165,overflow:'truncate',color:'#374151',
          rich:{
            tag:function(name,type){
              if(type==='数字化相关') return {backgroundColor:'rgba(59,130,246,0.12)',color:'#2563eb',borderRadius:3,padding:[1,4],fontSize:9,align:'right'};
              if(type==='软件相关') return {backgroundColor:'rgba(245,158,11,0.12)',color:'#d97706',borderRadius:3,padding:[1,4],fontSize:9,align:'right'};
              if(type==='硬件相关') return {backgroundColor:'rgba(31,41,55,0.1)',color:'#374151',borderRadius:3,padding:[1,4],fontSize:9,align:'right'};
              return {display:'none'};
            }
          }
        },
        splitLine:{show:true,lineStyle:{color:'#e5e7eb',type:'dashed'}}
      },
      series:[{
        type:'custom',
        renderItem:function(params,api){
          var ci=api.value(0);
          var start=api.value(1);
          var end=api.value(2);
          var progress=api.value(3);
          var barWidth=api.coord([end,ci])[0]-api.coord([start,ci])[0];
          var s=api.coord([start,ci]);
          var e=api.coord([end,ci]);
          var h=api.size([0,1])[1]*0.5;
          var y=e[1]-h/2;
          var progressW=Math.max(barWidth*progress,progress>0?2:0);
          var children=[];

          // full duration bar (light blue)
          children.push({
            type:'rect',
            shape:{x:s[0],y:y,width:Math.max(barWidth,3),height:h},
            style:{fill:'#B0D8FF'}
          });
          // completed portion (dark green)
          if(progressW>0){
            children.push({
              type:'rect',
              shape:{x:s[0],y:y,width:progressW,height:h},
              style:{fill:'#2E8B57'}
            });
          }
          // progress badge
          var pct=Math.round(progress*100);
          var badgeW=pct>=100?40:pct>=10?34:30;
          children.push({
            type:'rect',
            shape:{x:e[0]+4,y:y+1,width:badgeW,height:h-2},
            style:{fill:'#2E8B57',rx:3,ry:3}
          });
          children.push({
            type:'text',
            style:{text:pct+'%',x:e[0]+4+badgeW/2,y:e[1],fill:'#fff',font:'bold 10px sans-serif',textAlign:'center',textVerticalAlign:'middle'}
          });

          return {type:'group',children:children};
        },
        data:gd.map(function(d,i){
          return {name:d.name,value:[gd.length-1-i,d.start,d.end,d.progress],start:d.start,end:d.end,progress:d.progress,person:d.person||'',type:d.type||''};
        }),
        encode:{x:[1,2],y:0}
      }]
    });

    // Add today markLine
    c4.setOption({
      series:[{
        markLine:{
          silent:true,symbol:'none',
          lineStyle:{color:'#ef4444',type:'dashed',width:1.5},
          data:[{xAxis:todayTs}],
          label:{show:true,formatter:'今天',position:'start',fontSize:10,color:'#ef4444',backgroundColor:'#fff',padding:[1,4]}
        }
      }]
    });
  }
  charts.c4=c4;
})();

window.addEventListener('resize',function(){
  for(var k in charts){if(charts[k]) charts[k].resize();}
  var nowMobile=window.innerWidth<=768;
  if(nowMobile!==isMobile){
    isMobile=nowMobile;
    setProgressOption(isMobile);
    buildCustomLegend();
  }
});
</script>
</body>
</html>
